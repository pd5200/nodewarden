# =============================================================================
# Cloudflare Workers 自动部署
# =============================================================================
#
# 【必须在 GitHub 里配置的 Secrets（仓库 Settings → Secrets and variables → Actions）】
#
# 1) CLOUDFLARE_API_TOKEN（必填）
#    在 Cloudflare 控制台：右上角头像 → My Profile → API Tokens → Create Token
#    推荐：使用模板「Edit Cloudflare Workers」，或自定义 Token，至少包含：
#      • Account → Workers Scripts → Edit        （部署 Worker）
#      • Account → Workers Tail → Read           （可选，仅 tail 日志）
#      • Account → D1 → Edit                     （本项目使用 D1：nodewarden-db）
#      • Account → R2 Storage → Edit             （本项目使用 R2：nodewarden-attachments）
#      • Account → Workers KV Storage → Edit     （若你改用 wrangler.kv.toml 部署则需要）
#      • Account → Account Settings → Read       （Wrangler 常需要读取账户信息）
#    不要用 Global API Key，请用有限权限的 API Token。
#
# 2) CLOUDFLARE_ACCOUNT_ID（必填，除非已在 wrangler.toml 里写死 account_id）
#    位置：Cloudflare 控制台 → 任意 Workers 页面右侧，或 Overview 里「Account ID」
#    建议放在 Secrets；也可放在 Variables（非敏感，但 Secret 更统一）
#
# 【若使用 KV 版 Worker（wrangler.kv.toml）】
#   把下方 job 里 wrangler-action 的 command 改为：deploy --config wrangler.kv.toml
#   且 Token 需含 Workers KV Storage → Edit。
#
# 【GitHub Actions】
#
#   permissions: contents: read 即可；未配置或错误 Secret 时部署步骤会失败，便于排查。
#
# 【Cloudflare 侧前提】
#
#   • 账号下已存在 wrangler.toml 里同名的 D1（database_name）、R2（bucket_name）
#   • Worker 名称与 wrangler.toml 的 name 一致，或首次部署会创建新 Worker
#   • 敏感配置（如 JWT_SECRET）若在 Dashboard 里绑了，CI 部署会保留；勿把密钥写进仓库
#
# =============================================================================

name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Login Cloudflare
        run: |
          wrangler whoami
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Set Secrets
        run: |
          echo "${{ secrets.JWT_SECRET }}" | wrangler secret put JWT_SECRET
          echo "${{ secrets.TOTP_SECRET }}" | wrangler secret put TOTP_SECRET
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy
        run: wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
